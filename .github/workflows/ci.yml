name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: RelWithDebInfo

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - qt_version: 5
            packages: qtbase5-dev libxrandr-dev libx11-dev
            cmake_args: -DENABLE_X11=ON -DENABLE_WAYLAND=OFF
          - qt_version: 5
            packages: qtbase5-dev libwayland-dev
            cmake_args: -DENABLE_X11=OFF -DENABLE_WAYLAND=ON
          - qt_version: 6
            packages: qt6-base-dev libglx-dev libgl1-mesa-dev libxrandr-dev libx11-dev
            cmake_args: -DENABLE_X11=ON -DENABLE_WAYLAND=OFF
          - qt_version: 6
            packages: qt6-base-dev libglx-dev libgl1-mesa-dev libwayland-dev
            cmake_args: -DENABLE_X11=OFF -DENABLE_WAYLAND=ON
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
          sudo apt update
          sudo apt install ${{matrix.packages}}

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DSCRONIFY_QTVERSION=${{matrix.qt_version}} -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} ${{matrix.cmake_args}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
